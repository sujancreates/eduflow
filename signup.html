<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - EduFlow</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <section class="auth-page">
        <div class="bg-blur blur-1"></div>
        <div class="bg-blur blur-2"></div>

        <div class="auth-card modern-card">
            <div class="auth-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>EduFlow</span>
            </div>

            <div class="auth-top">
                <span class="auth-badge">Get started</span>
                <h1>Create Account</h1>
                <p>Create your account to start using EduFlow</p>
            </div>

            <form class="auth-form" id="signupForm" novalidate>
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Enter your full name" autocomplete="off">
                    </div>
                    <small class="error-text"></small>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" autocomplete="off">
                    </div>
                    <small class="error-text"></small>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a password" autocomplete="off">
                        <button type="button" class="toggle-password" id="toggleSignupPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="error-text"></small>
                </div>

                <button type="submit" class="auth-btn">Create Account</button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </section>

    <script src="js/auth.js"></script>
</body>
</html>
