<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <section class="auth-page">
        <div class="bg-blur blur-1"></div>
        <div class="bg-blur blur-2"></div>

        <div class="auth-card modern-card">
            <div class="auth-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>EduFlow</span>
            </div>

            <div class="auth-top">
                <span class="auth-badge">Welcome back</span>
                <h1>Login</h1>
                <p>Sign in to continue to your dashboard</p>
            </div>

            <form class="auth-form" id="loginForm" novalidate>
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Enter your email" autocomplete="off">
                    </div>
                    <small class="error-text"></small>
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="off">
                        <button type="button" class="toggle-password" id="toggleLoginPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="error-text"></small>
                </div>

                <div class="auth-row">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>

                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn">Login</button>
            </form>

            <p class="auth-switch">
                Don’t have an account? <a href="signup.html">Create one</a>
            </p>
        </div>
    </section>

    <script src="js/auth.js"></script>
</body>
</html>
