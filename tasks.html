<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - EduAssist</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/tasks.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- TOP NAV (Back Button) -->  
<div class="topbar">

    <div class="topbar-left">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </button>

        <div class="topbar-text">
            <h1>Tasks</h1>
            <p>Manage your academic tasks efficiently</p>
        </div>
    </div>

</div>

    <!-- TASK PAGE -->
    <section class="task-page">

        <!-- FORM -->
        <div class="panel task-form-panel">
            <div class="section-heading">
                <div>
                    <p class="section-label">Task Management</p>
                    <h2>Add New Task</h2>
                </div>
            </div>

            <form id="task-form">
                <div class="input-group">
                    <label>Task Title</label>
                    <input type="text" id="title" placeholder="Enter task title" required>
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Write short task details"></textarea>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Due Date</label>
                        <input type="date" id="dueDate" required>
                    </div>

                    <div class="input-group">
                        <label>Priority</label>
                        <select id="priority">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="primary-btn">
                    <i class="fas fa-plus-circle"></i>
                    Add Task
                </button>
            </form>
        </div>

        <!-- TASK LIST -->
        <div class="panel task-list-panel">
            <div class="section-heading">
                <div>
                    <p class="section-label">Overview</p>
                    <h2>Your Tasks</h2>
                </div>
            </div>

            <div id="task-list" class="task-list"></div>
        </div>

    </section>

    <script src="js/tasks.js"></script>

</body>

</html>
